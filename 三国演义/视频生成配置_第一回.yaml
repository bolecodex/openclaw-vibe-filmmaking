  - scene_id: cao_cao_scene
    scene_name: 曹操出场
    start_time: 760
    end_time: 880
    shots:
      - shot_id: cao_1
        start_time: 760
        end_time: 775
        image: "shots/cao_5.jpg"
        audio: "audio/dub_048.mp3"
        bgm: "bgm/caocao_entry.mp3"
        subtitle: "张梁、张宝引败残军士，夺路而走。忽见一彪军马，尽打红旗，当头来到，截住去路。为首闪出一将：身长七尺，细眼长髯；官拜骑都尉；沛国谯郡人也，姓曹，名操，字孟德。"
        transition: "fade"
      - shot_id: cao_2
        start_time: 775
        end_time: 790
        image: "shots/cao_7.jpg"
        audio: "audio/dub_049.mp3"
        bgm: "bgm/war_battle.mp3"
