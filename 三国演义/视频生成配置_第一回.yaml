        transition: "fade"
      - shot_id: battle_4
        start_time: 643
        end_time: 650
        image: "shots/battle_5.jpg"
        audio: "audio/dub_044.mp3"
        bgm: "bgm/war_battle.mp3"
        subtitle: "鼠辈安敢造次！"
        transition: "fade"
        sfx: "sfx/spear_stab.mp3"
      - shot_id: battle_5
        start_time: 650
        end_time: 658
        image: "shots/battle_6.jpg"
        audio: "audio/dub_045.mp3"
        bgm: "bgm/war_battle.mp3"
