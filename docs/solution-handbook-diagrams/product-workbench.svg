<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 320" width="1120" height="320">
  <defs>
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1020"/>
      <stop offset="55%" style="stop-color:#12182e"/>
      <stop offset="100%" style="stop-color:#0d1528"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="50%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <linearGradient id="pillAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="cardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/></filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(148,163,184,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1120" height="320" fill="url(#bgMain)"/>
  <rect width="1120" height="320" fill="url(#grid)" opacity="0.9"/>
  <text x="560" y="40" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="17" font-weight="800" fill="url(#titleGrad)">产品工作台 · 一屏完成 管项目 · 跑工序 · 看出品</text>
  <text x="560" y="58" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="10" fill="rgba(148,163,184,0.85)">OpenClaw Studio · 功能分区示意（以实际交付界面为准）</text>

  <!-- 左：工作区 -->
  <g filter="url(#cardGlow)">
    <rect x="20" y="72" width="210" height="228" rx="16" fill="rgba(15,23,42,0.75)" stroke="rgba(99,102,241,0.45)" stroke-width="1.5"/>
    <rect x="20" y="72" width="210" height="3" rx="1" fill="url(#titleGrad)" opacity="0.85"/>
  </g>
  <text x="125" y="104" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="800" fill="#e2e8f0">工作区</text>
  <text x="125" y="132" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#94a3b8">项目与文件树</text>
  <text x="125" y="154" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="11" fill="#94a3b8">技能与标准工序</text>
  <circle cx="125" cy="188" r="3" fill="#6366f1" opacity="0.9"/>
  <text x="125" y="210" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="9" fill="#64748b">入口统一 · 上下文不丢</text>

  <!-- 中：主界面 Tab（网格排版，不溢出） -->
  <g filter="url(#cardGlow)">
    <rect x="246" y="72" width="628" height="228" rx="16" fill="rgba(15,23,42,0.72)" stroke="rgba(168,85,247,0.4)" stroke-width="1.5"/>
    <rect x="246" y="72" width="628" height="3" rx="1" fill="url(#pillAccent)" opacity="0.7"/>
  </g>
  <text x="560" y="104" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="800" fill="#e2e8f0">主界面功能分区（Tab）</text>

  <!-- 第一行 6 枚：总控与资产（石板色） -->
  <g font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="10" font-weight="700" fill="#f1f5f9">
    <rect x="266" y="118" width="88" height="28" rx="14" fill="#475569" stroke="rgba(148,163,184,0.35)"/>
    <text x="310" y="136" text-anchor="middle">概览</text>
    <rect x="364" y="118" width="88" height="28" rx="14" fill="#475569" stroke="rgba(148,163,184,0.35)"/>
    <text x="408" y="136" text-anchor="middle">流水线</text>
    <rect x="462" y="118" width="88" height="28" rx="14" fill="#64748b" stroke="rgba(148,163,184,0.3)"/>
    <text x="506" y="136" text-anchor="middle">风格</text>
    <rect x="560" y="118" width="88" height="28" rx="14" fill="#64748b" stroke="rgba(148,163,184,0.3)"/>
    <text x="604" y="136" text-anchor="middle">角色</text>
    <rect x="658" y="118" width="88" height="28" rx="14" fill="#64748b" stroke="rgba(148,163,184,0.3)"/>
    <text x="702" y="136" text-anchor="middle">场景</text>
    <rect x="756" y="118" width="88" height="28" rx="14" fill="#64748b" stroke="rgba(148,163,184,0.3)"/>
    <text x="800" y="136" text-anchor="middle">道具</text>
  </g>

  <!-- 第二行 4 枚：镜头级出品（渐变） -->
  <g font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="10" font-weight="700" fill="#fff">
    <rect x="314" y="158" width="112" height="30" rx="15" fill="url(#pillAccent)" filter="url(#softShadow)"/>
    <text x="370" y="177" text-anchor="middle">分镜图</text>
    <rect x="438" y="158" width="112" height="30" rx="15" fill="url(#pillAccent)" filter="url(#softShadow)"/>
    <text x="494" y="177" text-anchor="middle">音频</text>
    <rect x="562" y="158" width="112" height="30" rx="15" fill="url(#pillAccent)" filter="url(#softShadow)"/>
    <text x="618" y="177" text-anchor="middle">视频</text>
    <rect x="686" y="158" width="112" height="30" rx="15" fill="url(#pillAccent)" filter="url(#softShadow)"/>
    <text x="742" y="177" text-anchor="middle">剪辑</text>
  </g>

  <text x="560" y="214" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="10" fill="#94a3b8">上行 · 总控与资产对齐（Vibe 定调）</text>
  <text x="560" y="232" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="10" fill="#a78bfa">下行 · 镜头级出品验收（图 / 音 / 视 / 剪）</text>

  <!-- 右：协作 -->
  <g filter="url(#cardGlow)">
    <rect x="890" y="72" width="210" height="228" rx="16" fill="rgba(15,23,42,0.75)" stroke="rgba(34,211,238,0.4)" stroke-width="1.5"/>
    <rect x="890" y="72" width="210" height="3" rx="1" fill="#22d3ee" opacity="0.75"/>
  </g>
  <text x="995" y="104" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="13" font-weight="800" fill="#e2e8f0">协作方式</text>
  <text x="995" y="136" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="10" fill="#94a3b8">流水线 · 按步执行 / 重试</text>
  <text x="995" y="158" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="10" fill="#94a3b8">对话 · 单步或单镜</text>
  <text x="995" y="180" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="10" fill="#94a3b8">日志 · 进度与异常</text>
  <text x="995" y="212" text-anchor="middle" font-family="system-ui,PingFang SC,Microsoft YaHei,sans-serif" font-size="9" fill="#64748b">与龙虾编排同源上下文</text>
</svg>